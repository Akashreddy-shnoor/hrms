databases:
  - name: hrms-db
    databaseName: hrms
    user: hrms_user
    plan: free

services:
  # Backend API Service
  - type: web
    name: hrms-backend
    env: node
    plan: free
    rootDir: hrms-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false

  # Frontend Web App
  - type: web
    name: hrms-frontend
    env: static
    plan: free
    rootDir: hrms-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
